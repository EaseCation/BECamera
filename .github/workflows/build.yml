name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build all versions
        run: ./gradlew chiseledBuild
      - name: upload 1.21.5
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.5
          path: versions/1.21.5/build/libs/bedrockcameralib-mc1.21.5-*.jar
      - name: upload 1.21.6
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.6
          path: versions/1.21.6/build/libs/bedrockcameralib-mc1.21.6-*.jar
      - name: upload 1.21.7
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.7
          path: versions/1.21.7/build/libs/bedrockcameralib-mc1.21.7-*.jar
      - name: upload 1.21.8
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.8
          path: versions/1.21.8/build/libs/bedrockcameralib-mc1.21.8-*.jar
      - name: upload 1.21.9
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.9
          path: versions/1.21.9/build/libs/bedrockcameralib-mc1.21.9-*.jar
      - name: upload 1.21.10
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.10
          path: versions/1.21.10/build/libs/bedrockcameralib-mc1.21.10-*.jar
      - name: upload 1.21.11
        uses: actions/upload-artifact@v4
        with:
          name: bedrockcameralib-mc1.21.11
          path: versions/1.21.11/build/libs/bedrockcameralib-mc1.21.11-*.jar
